<p>  The following discounted rates are available for conference attendees:
  <ul>
<li> single occupancy hotel-style room in <a
  href="http://www.mannix.monash.edu/external-guests/">Gryphon

<li> double occupancy hotel-style room in <a href="http://www.mannix.monash.edu/external-guests/">Gryphon House</a>, $140/night including meals </li>

  <p> To book rooms at Mannix College, email enquiries.mannix@monash.edu or
